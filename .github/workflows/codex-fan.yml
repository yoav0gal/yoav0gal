name: Codex Fan Pulse

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Refresh Codex fan section
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import os
          import re

          readme = Path("README.md")
          text = readme.read_text()
          refreshed = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          run_number = os.environ["RUN_NUMBER"]
          block = f"""<!-- CODEX-FAN:START -->
          <img src="https://img.shields.io/badge/Codex%20fan-always%20building-00C2FF?style=for-the-badge&logo=openai&logoColor=white" alt="Codex fan" />
          <br />
          <sub>Codex pulse refreshed: {refreshed} | run #{run_number}</sub>
          <!-- CODEX-FAN:END -->"""

          next_text = re.sub(
              r"<!-- CODEX-FAN:START -->.*?<!-- CODEX-FAN:END -->",
              block,
              text,
              flags=re.S,
          )

          if next_text == text:
              raise SystemExit("Codex fan markers were not found in README.md")

          readme.write_text(next_text)
          PY

      - name: Commit refreshed pulse
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh Codex fan pulse"
          file_pattern: README.md
